
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WillFitness | Transformasi Bareng Jan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        :root {
            --will-blue: #0082D5;
            --neon-purple: #6d28d9;
            --dark-bg: #020617;
        }

        body {
            background-color: var(--dark-bg);
            color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden; /* Mencegah layar bergeser */
            height: 100vh;
            width: 100vw;
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .btn-main {
            background: linear-gradient(135deg, var(--will-blue), var(--neon-purple));
            box-shadow: 0 0 20px rgba(0, 130, 213, 0.3);
            transition: all 0.3s ease;
        }

        .btn-main:active {
            transform: scale(0.96);
        }

        .logo-glow {
            filter: drop-shadow(0 0 8px rgba(0, 130, 213, 0.6));
        }

        /* Custom Slider Style */
        input[type=range] {
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.1);
            height: 6px;
            border-radius: 5px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 22px;
            width: 22px;
            border-radius: 50%;
            background: var(--will-blue);
            box-shadow: 0 0 10px var(--will-blue);
            cursor: pointer;
        }

        .section-view { display: flex !important; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-content { animation: fadeInUp 0.5s ease-out forwards; }
    </style>
</head>
<body>

    <!-- Header Section -->
    <header class="w-full p-6 flex justify-between items-center z-50">
        <img src="https://blogger.googleusercontent.com/img/a/AVvXsEgsxwUWQ2dEVuuofFXZH99c2b_RMH3vZ6aN1ihSMie7Q_L7gYwsH3gyt2ey--8fqAlRQEMb9BITFLtDju7MHAwuwGeqjmLUC_RmwD3ASmSS26HPAM4STxYyaGdqoPrTGQiFOwWZROeefsasd5t9zjLtBws0wuWQ5dmXEmoS50VhQQhkpwWGSipmR3nLkJ4" 
             alt="WillFitness Logo" class="h-8 md:h-10 logo-glow">
        <div class="text-[10px] font-extrabold tracking-[0.3em] text-blue-400/70 uppercase">Kalimalang Hub</div>
    </header>

    <main class="flex-grow relative overflow-hidden">
        
        <!-- Latar Belakang Estetik -->
        <div class="absolute inset-0 pointer-events-none">
            <div class="absolute top-1/4 -left-20 w-72 h-72 bg-blue-600/10 rounded-full blur-[120px]"></div>
            <div class="absolute bottom-1/4 -right-20 w-72 h-72 bg-purple-600/10 rounded-full blur-[120px]"></div>
        </div>

        <!-- 1. HERO PAGE -->
        <section id="hero" class="section-view hidden absolute inset-0 flex-col items-center justify-center p-6 text-center">
            <div class="animate-content max-w-md">
                <h1 class="text-4xl md:text-5xl font-black mb-4 leading-tight">
                    GASIN <br> <span class="text-[#0082D5]">BADAN IDEALMU!</span>
                </h1>
                <p class="text-slate-400 mb-10 text-sm md:text-base leading-relaxed">
                    Halo Sobat! Jan di sini. Yuk, kita bedah komposisi badan kamu biar program latihannya nggak asal-asalan.
                </p>
                <button onclick="goTo('quiz')" class="btn-main px-12 py-4 rounded-2xl font-extrabold tracking-widest uppercase text-sm">
                    MULAI CEK SEKARANG
                </button>
            </div>
        </section>

        <!-- 2. QUIZ PAGE -->
        <section id="quiz" class="hidden absolute inset-0 flex-col items-center justify-center p-4">
            <div class="glass-card w-full max-w-md rounded-[2.5rem] p-8 animate-content flex flex-col h-auto">
                <div class="flex items-center justify-between mb-8">
                    <span id="step-txt" class="text-[10px] font-black text-[#0082D5] tracking-widest uppercase">Mulai Analisis</span>
                    <div class="w-20 h-1 bg-white/5 rounded-full overflow-hidden">
                        <div id="bar" class="h-full bg-[#0082D5] transition-all duration-300" style="width: 5%"></div>
                    </div>
                </div>

                <div id="q-box" class="flex-grow flex flex-col justify-center min-h-[220px]">
                    <!-- Pertanyaan muncul di sini -->
                </div>

                <div class="flex justify-between items-center mt-8 pt-6 border-t border-white/5">
                    <button id="back" onclick="prev()" class="text-slate-500 font-bold text-xs invisible uppercase tracking-widest">Balik</button>
                    <button id="next" onclick="next()" class="btn-main px-10 py-3 rounded-xl font-bold text-sm">LANJUT</button>
                </div>
            </div>
        </section>

        <!-- 3. RESULT PAGE -->
        <section id="result" class="hidden absolute inset-0 flex-col items-center justify-center p-4">
            <div class="glass-card w-full max-w-md rounded-[3rem] p-8 text-center animate-content">
                <div class="inline-flex items-center justify-center w-12 h-12 rounded-2xl bg-[#0082D5]/20 mb-4">
                    <i class="fas fa-chart-line text-[#0082D5] text-xl"></i>
                </div>
                <h2 class="text-2xl font-extrabold mb-1 uppercase italic">Hasil Diagnosa</h2>
                <p class="text-slate-400 text-[11px] mb-8">Data kamu udah Jan olah, ini hasilnya:</p>

                <div class="space-y-4 text-left mb-8">
                    <div class="p-5 bg-white/5 rounded-3xl border border-white/5">
                        <span class="text-[9px] font-black text-[#0082D5] uppercase tracking-widest">Rekomendasi Program</span>
                        <h3 id="res-name" class="text-lg font-bold text-white mt-1">---</h3>
                        <p id="res-info" class="text-[11px] text-slate-400 mt-2 leading-relaxed">---</p>
                    </div>
                    <div class="p-5 bg-white/5 rounded-3xl border border-white/5">
                        <span class="text-[9px] font-black text-purple-400 uppercase tracking-widest">Target Sesi</span>
                        <h3 id="res-freq" class="text-lg font-bold text-white mt-1">---</h3>
                    </div>
                </div>

                <button onclick="kontakJan()" class="btn-main w-full py-4 rounded-2xl font-black flex items-center justify-center gap-3 tracking-widest">
                    <i class="fab fa-whatsapp text-xl"></i> KONSULTASI SAMA JAN
                </button>
                <p class="text-[9px] text-slate-500 mt-5 uppercase tracking-[0.2em]">WillFitness | No Excuses</p>
            </div>
        </section>

    </main>

    <script>
        const waJanNum = "6285157703110";
        const daftarPertanyaan = [
            { id: "bf", q: "Persentase Body Fat kamu kira-kira di angka berapa?", type: "range", min: 5, max: 50, unit: "%", def: 30 },
            { id: "otot", q: "Kalo liat cermin, massa otot kamu gimana?", type: "select", opts: ["Masih Tipis", "Udah Lumayan", "Udah Gede"] },
            { id: "vis", q: "Level lemak perut (visceral) kamu?", type: "range", min: 1, max: 20, unit: "", def: 8 },
            { id: "bmr", q: "Metabolisme kamu biasanya...", type: "select", opts: ["Gampang Gemuk", "Normal-normal aja", "Makan banyak tetep kurus"] },
            { id: "cek_simetris", q: "Ada otot yang keliatan gede sebelah?", type: "select", opts: ["Ada", "Enggak"] },
            { id: "cedera", q: "Ada riwayat cedera (Lutut/Pinggang/Bahu)?", type: "select", opts: ["Ada nih", "Aman jaya"] },
            { id: "fleksi", q: "Bisa squat dalem tanpa ngerasa kaku/sakit?", type: "select", opts: ["Bisa banget", "Agak kaku", "Sakit"] },
            { id: "tidur", q: "Tidur sehari rata-rata berapa jam, Sob?", type: "range", min: 3, max: 10, unit: " jam", def: 7 },
            { id: "medis", q: "Ada keluhan kesehatan (Tensi/Gula)?", type: "select", opts: ["Ada", "Aman"] },
            { id: "air", q: "Minum air putih sehari berapa liter?", type: "range", min: 1, max: 5, unit: " liter", def: 2 },
            { id: "makan", q: "Sehari makan besar berapa kali?", type: "range", min: 1, max: 6, unit: " kali", def: 3 },
            { id: "junk", q: "Hobi makan gorengan / minuman manis?", type: "select", opts: ["Tiap Hari", "Kalo pengen aja", "Jarang banget"] },
            { id: "pro", q: "Asupan protein (ayam/telur) tiap hari gimana?", type: "select", opts: ["Kurang", "Cukup", "Banyak"] },
            { id: "hab", q: "Kamu ngerokok atau minum alkohol?", type: "select", opts: ["Ya", "Enggak"] },
            { id: "goal", q: "Fokus utama kamu 3 bulan kedepan?", type: "select", opts: ["Turunin Berat", "Bikin Otot", "Sehat & Bugar"] },
            { id: "days", q: "Seminggu bisa ke gym berapa hari?", type: "range", min: 1, max: 7, unit: " hari", def: 3 },
            { id: "dur", q: "Sekali latihan sanggup berapa menit?", type: "range", min: 30, max: 120, unit: " mnt", def: 60 },
            { id: "type", q: "Tipe latihan yang kamu suka?", type: "select", opts: ["Angkat Beban", "Kardio/Lari", "Campur"] },
            { id: "stres", q: "Tingkat stres harian kamu (1-10)?", type: "range", min: 1, max: 10, unit: "", def: 5 },
            { id: "vibe", q: "Apa yang paling bikin kamu semangat?", type: "select", opts: ["Body Goals", "Sehat", "Kesehatan Mental"] }
        ];

        let indexQ = 0;
        let hasilData = {};

        function goTo(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.getElementById(id).classList.add('section-view');
        }

        function tampilQ() {
            const dataQ = daftarPertanyaan[indexQ];
            const box = document.getElementById('q-box');
            document.getElementById('step-txt').innerText = `Step ${indexQ + 1} / 20`;
            document.getElementById('bar').style.width = `${((indexQ + 1) / 20) * 100}%`;

            let html = `<p class="text-xl font-bold mb-8 leading-snug">${dataQ.q}</p>`;

            if (dataQ.type === 'range') {
                const val = hasilData[dataQ.id] || dataQ.def;
                html += `
                    <div class="flex flex-col items-center">
                        <span id="range-v" class="text-5xl font-black text-[#0082D5] mb-6 italic">${val}${dataQ.unit}</span>
                        <input type="range" min="${dataQ.min}" max="${dataQ.max}" value="${val}" 
                               class="w-full" oninput="updateR(this, '${dataQ.id}', '${dataQ.unit}')">
                    </div>
                `;
                hasilData[dataQ.id] = val;
            } else {
                html += `<div class="grid gap-3">`;
                dataQ.opts.forEach(o => {
                    const sel = hasilData[dataQ.id] === o ? 'border-[#0082D5] bg-[#0082D5]/10 shadow-lg shadow-blue-500/10' : 'border-white/5';
                    html += `<button onclick="setO('${dataQ.id}', '${o}')" class="p-4 rounded-2xl border ${sel} text-left text-sm transition-all">${o}</button>`;
                });
                html += `</div>`;
            }
            box.innerHTML = html;
            document.getElementById('back').style.visibility = indexQ === 0 ? 'hidden' : 'visible';
            document.getElementById('next').innerText = indexQ === 19 ? 'CEK HASIL' : 'LANJUT';
        }

        function updateR(el, id, u) {
            document.getElementById('range-v').innerText = el.value + u;
            hasilData[id] = el.value;
        }

        function setO(id, v) {
            hasilData[id] = v;
            tampilQ();
        }

        function next() {
            if (!hasilData[daftarPertanyaan[indexQ].id]) return;
            if (indexQ < 19) { indexQ++; tampilQ(); }
            else { selesai(); }
        }

        function prev() {
            if (indexQ > 0) { indexQ--; tampilQ(); }
        }

        function selesai() {
            goTo('result');
            const bf = parseInt(hasilData.bf);
            const target = hasilData.goal;

            let namaP = "Body Recomposition";
            let infoP = "Fokus buat kamu yang mau nurunin lemak tapi otot tetep kenceng. Jan bakal dampingin biar progresnya keliatan!";
            let freqP = `${hasilData.days} Sesi / Minggu`;

            if (bf > 30) {
                namaP = "Fat Loss Advanced";
                infoP = "Prioritas kita buang cadangan lemak dulu dengan latihan intensitas moderat. Tenang, Jan pastiin metabolisme kamu tetep terjaga.";
            } else if (target === "Bikin Otot") {
                namaP = "Muscle Hypertrophy";
                infoP = "Waktunya gedein otot! Kita fokus di latihan beban progresif. Jan siap bantu jaga form latihan kamu biar aman.";
            }

            document.getElementById('res-name').innerText = namaP;
            document.getElementById('res-info').innerText = infoP;
            document.getElementById('res-freq').innerText = freqP;
        }

        function kontakJan() {
            const teks = `Halo Jan! Saya abis cek spek badan di WillFitness nih.%0A%0A- Program: ${document.getElementById('res-name').innerText}%0A- Target Sesi: ${document.getElementById('res-freq').innerText}%0A- Body Fat: ${hasilData.bf}%25%0A%0AMau nanya detail harga membership sama jadwal latihan dong!`;
            window.open(`https://wa.me/${waJanNum}?text=${teks}`, '_blank');
        }

        tampilQ();
    </script>
</body>
</html>

```
