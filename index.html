```html
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WA Link Generator - Will Fitness Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen pb-12">

    <!-- Header -->
    <nav class="bg-emerald-600 text-white p-4 shadow-lg mb-6 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-white p-1 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-emerald-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                </div>
                <h1 class="font-bold text-xl">Will Fitness WA Tool</h1>
            </div>
            <div class="text-xs bg-emerald-700 px-3 py-1.5 rounded-full" id="stats-badge">Siap menerima file</div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- Kolom Kiri: Input -->
        <div class="lg:col-span-4 space-y-5">
            
            <!-- 1. Upload Box -->
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <label class="block text-sm font-bold text-slate-700 mb-3">1. Unggah File Member</label>
                <div id="drop-zone" class="border-2 border-dashed border-emerald-200 rounded-xl p-6 text-center hover:bg-emerald-50 cursor-pointer transition-all group">
                    <input type="file" id="csv-input" class="hidden" accept=".csv, .xlsx, .xls">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 mx-auto text-emerald-400 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                    <p class="text-xs text-slate-500 font-medium">Klik untuk pilih file CSV/Excel</p>
                </div>
                <div class="mt-3 flex items-center gap-2">
                    <input type="checkbox" id="has-header" class="rounded text-emerald-600 focus:ring-emerald-500">
                    <label for="has-header" class="text-xs text-slate-600">File memiliki judul kolom (Header)</label>
                </div>
            </div>

            <!-- 2. Mapping -->
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200" id="mapping-card">
                <label class="block text-sm font-bold text-slate-700 mb-4">2. Atur Kolom Data</label>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] uppercase font-bold text-slate-400 block mb-1">Kolom Nama</label>
                        <select id="select-name" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-sm outline-none focus:ring-2 focus:ring-emerald-500"></select>
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-bold text-slate-400 block mb-1">Kolom Nomor HP</label>
                        <select id="select-phone" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-sm outline-none focus:ring-2 focus:ring-emerald-500"></select>
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-bold text-slate-400 block mb-1">Kolom Expired Date</label>
                        <select id="select-expiry" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-sm outline-none focus:ring-2 focus:ring-emerald-500"></select>
                    </div>
                </div>
            </div>

            <!-- 3. Template -->
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <label class="block text-sm font-bold text-slate-700 mb-3">3. Pesan WhatsApp</label>
                <textarea id="msg-template" class="w-full h-32 p-3 text-sm bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 resize-none">Halo {{Nama Member}}, member Will Fitness Anda akan berakhir pada {{Expired Date}}. Segera perpanjang ya!</textarea>
                <div class="mt-2 flex flex-wrap gap-1">
                    <span class="text-[9px] bg-slate-100 px-2 py-1 rounded text-slate-500 uppercase font-bold">Variabel: {{Nama Member}}, {{Expired Date}}</span>
                </div>
            </div>
        </div>

        <!-- Kolom Kanan: Hasil -->
        <div class="lg:col-span-8 flex flex-col h-full">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col overflow-hidden h-[calc(100vh-140px)] min-h-[500px]">
                <div class="p-5 border-b border-slate-100 flex items-center justify-between bg-white sticky top-0 z-10">
                    <h2 class="font-bold text-slate-700 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 00 2 2h10a2 2 0 00 2-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
                        Daftar Tautan Siap Kirim
                    </h2>
                    <button id="btn-export" class="hidden text-xs font-bold text-emerald-600 hover:bg-emerald-50 px-3 py-2 rounded-lg transition-colors border border-emerald-100">Ekspor Ke Excel</button>
                </div>

                <div class="flex-1 overflow-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-50/80 sticky top-0 z-10 backdrop-blur-sm">
                            <tr class="text-[10px] uppercase font-bold text-slate-400">
                                <th class="px-5 py-3 border-b border-slate-100">Nama</th>
                                <th class="px-5 py-3 border-b border-slate-100">Nomor</th>
                                <th class="px-5 py-3 border-b border-slate-100">Expired</th>
                                <th class="px-5 py-3 border-b border-slate-100 text-right">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="result-list" class="divide-y divide-slate-50">
                            <tr>
                                <td colspan="4" class="px-5 py-20 text-center text-slate-400 text-sm">Belum ada data. Silakan pilih file.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-10 right-10 bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl opacity-0 translate-y-10 transition-all duration-300 flex items-center gap-3 z-[100]">
        <span id="toast-msg">Berhasil!</span>
    </div>

    <script>
        let rawData = [];
        let colNames = [];

        // Elements
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('csv-input');
        const hasHeader = document.getElementById('has-header');
        const selectName = document.getElementById('select-name');
        const selectPhone = document.getElementById('select-phone');
        const selectExpiry = document.getElementById('select-expiry');
        const template = document.getElementById('msg-template');
        const resultList = document.getElementById('result-list');
        const statsBadge = document.getElementById('stats-badge');
        const btnExport = document.getElementById('btn-export');

        dropZone.onclick = () => fileInput.click();
        
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) processFile(file);
        };

        function processFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                
                // Gunakan header: 1 untuk mendapatkan array of arrays agar fleksibel
                const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                
                if (jsonData.length > 0) {
                    rawData = jsonData;
                    setupMapping();
                    renderResults();
                    statsBadge.innerText = `${jsonData.length} Member Dimuat`;
                    btnExport.classList.remove('hidden');
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function setupMapping() {
            const firstRow = rawData[0];
            colNames = firstRow.map((val, idx) => hasHeader.checked ? val : `Kolom ${idx + 1}`);
            
            const dropdowns = [selectName, selectPhone, selectExpiry];
            dropdowns.forEach((dropdown, idx) => {
                dropdown.innerHTML = '';
                colNames.forEach((name, colIdx) => {
                    const opt = document.createElement('option');
                    opt.value = colIdx;
                    opt.textContent = name;
                    
                    // Auto-detect based on index for your specific file
                    // Index 0: Nama, Index 1: Nomor, Index 2: Tanggal
                    if (dropdown === selectName && colIdx === 0) opt.selected = true;
                    if (dropdown === selectPhone && colIdx === 1) opt.selected = true;
                    if (dropdown === selectExpiry && colIdx === 2) opt.selected = true;
                    
                    dropdown.appendChild(opt);
                });
            });
        }

        function formatNumber(num) {
            if (!num) return "";
            let cleaned = String(num).replace(/\D/g, '');
            // Jika mulai dengan 8, tambahkan 62
            if (cleaned.startsWith('8')) {
                cleaned = '62' + cleaned;
            } 
            // Jika mulai dengan 08, ganti 0 dengan 62
            else if (cleaned.startsWith('08')) {
                cleaned = '62' + cleaned.substring(1);
            }
            return cleaned;
        }

        function renderResults() {
            resultList.innerHTML = '';
            
            // Jika ada header, lewati baris pertama
            const startIdx = hasHeader.checked ? 1 : 0;
            const nameCol = parseInt(selectName.value);
            const phoneCol = parseInt(selectPhone.value);
            const expiryCol = parseInt(selectExpiry.value);

            const displayData = rawData.slice(startIdx);

            if (displayData.length === 0) {
                resultList.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-slate-400">Tidak ada data.</td></tr>';
                return;
            }

            displayData.forEach((row, index) => {
                const name = row[nameCol] || '-';
                const rawPhone = row[phoneCol] || '';
                const cleanPhone = formatNumber(rawPhone);
                const expiry = row[expiryCol] || '-';

                let msg = template.value
                    .replace(/{{Nama Member}}/g, name)
                    .replace(/{{Expired Date}}/g, expiry);
                
                const waLink = `https://wa.me/${cleanPhone}?text=${encodeURIComponent(msg)}`;

                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-colors";
                tr.innerHTML = `
                    <td class="px-5 py-4 text-sm font-semibold text-slate-700">${name}</td>
                    <td class="px-5 py-4 text-sm text-slate-500 font-mono">${rawPhone}</td>
                    <td class="px-5 py-4 text-xs text-slate-500 font-medium">${expiry}</td>
                    <td class="px-5 py-4 text-right">
                        <div class="flex justify-end gap-2">
                            <button onclick="copyText('${waLink}')" class="p-2 text-slate-400 hover:text-emerald-600 bg-slate-100 hover:bg-emerald-50 rounded-lg transition-all" title="Salin Link">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            </button>
                            <a href="${waLink}" target="_blank" class="p-2 bg-emerald-500 text-white rounded-lg hover:bg-emerald-600 transition-all shadow-sm" title="Buka WA">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                            </a>
                        </div>
                    </td>
                `;
                resultList.appendChild(tr);
            });
        }

        // Listener Update
        [selectName, selectPhone, selectExpiry, hasHeader, template].forEach(el => {
            el.addEventListener('change', renderResults);
            if(el === template) el.addEventListener('keyup', renderResults);
        });

        function copyText(txt) {
            const input = document.createElement('textarea');
            input.value = txt;
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            document.body.removeChild(input);
            showToast("Tautan WA Berhasil Disalin!");
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.remove('opacity-0', 'translate-y-10');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-10');
            }, 3000);
        }

        btnExport.onclick = () => {
            const startIdx = hasHeader.checked ? 1 : 0;
            const dataToExport = rawData.slice(startIdx).map(row => {
                const name = row[parseInt(selectName.value)];
                const phone = formatNumber(row[parseInt(selectPhone.value)]);
                const expiry = row[parseInt(selectExpiry.value)];
                
                let msg = template.value
                    .replace(/{{Nama Member}}/g, name)
                    .replace(/{{Expired Date}}/g, expiry);

                return {
                    "Nama Member": name,
                    "No HP": row[parseInt(selectPhone.value)],
                    "Expired": expiry,
                    "Link WhatsApp": `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`
                };
            });

            const ws = XLSX.utils.json_to_sheet(dataToExport);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "WA Links");
            XLSX.writeFile(wb, "WillFitness_WA_Links.xlsx");
        };
    </script>
</body>
</html>
